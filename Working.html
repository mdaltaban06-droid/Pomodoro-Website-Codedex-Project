<!DOCTYPE html>
<html lang="en">
<head>
  <title>Pomodoro App by Kai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Asimovian&display=swap" rel="stylesheet">
  <link href = "style.css" rel = "stylesheet">
</head>
<body>
  <h1>Pomodoro</h1>
  <p class = "greetings">brought to you by Kai</p>
  <div class = "app-space">
  <div class = "message">press to start</div>
   <div class="app-circle">
    <div class="circle-shape">
      <div class="semi-circle right-side circle-mask"></div>
      <div class="semi-circle right-side circle"></div>
      <div class="semi-circle left-side circle-mask"></div>
      <div class="semi-circle left-side circle"></div>
    </div>
    <div class = "counter">
      <p class ="time"><span class = "minutes">25</span>:<span class = "seconds">00</span></p>
    </div>
    <button class = "are-we-bout-to-start">Start</button>
    </div>
  </div>
  <input class = "work" type="text" placeholder= "Please Enter the Jobs?" value ="">
  <input id= "submitting" type = "submit" value="Enter">
  <ol class = "jobs">
  </ol>
</body>
<script src = "script.js"></script>
</html>
